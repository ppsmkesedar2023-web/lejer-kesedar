<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Lejer KESEDAR v3.4 - Kawalan Penuh Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .row-overdue { background-color: #fef2f2 !important; border-left: 4px solid #ef4444; }
        .row-paid { background-color: #f0fdf4 !important; }
        
        @media print {
            body * { visibility: hidden; }
            #detail-view, #detail-view * { visibility: visible; }
            #detail-view { position: absolute; left: 0; top: 0; width: 100%; display: block !important; background: white !important; }
            .no-print { display: none !important; }
            table { border-collapse: collapse !important; width: 100% !important; }
            th, td { border: 1px solid #333 !important; padding: 6px !important; font-size: 9px !important; }
            .print-footer { display: flex !important; justify-content: space-between; margin-top: 50px; }
            .signature-box { border-top: 1px solid black; width: 200px; text-align: center; padding-top: 5px; font-size: 10px; }
        }
        .print-only { display: none; }
        @media print { .print-only { display: block !important; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div id="app" class="p-4 md:p-8">
        <div class="max-w-7xl mx-auto">
            
            <div id="list-view" class="space-y-6">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">e-Lejer KESEDAR</h1>
                        <p class="text-gray-500 text-sm">Sistem Pengurusan Pinjaman & Audit</p>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="exportToCSV()" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm shadow hover:bg-blue-700 transition"><i data-lucide="file-spreadsheet" class="w-4 h-4"></i> CSV</button>
                        <button onclick="backupData()" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm shadow hover:bg-emerald-700 transition"><i data-lucide="download" class="w-4 h-4"></i> Backup</button>
                        <label class="flex items-center gap-2 px-4 py-2 bg-orange-500 text-white rounded-lg text-sm shadow hover:bg-orange-600 transition cursor-pointer">
                            <i data-lucide="upload" class="w-4 h-4"></i> Restore
                            <input type="file" id="restoreFile" class="hidden" accept=".json" onchange="restoreData(event)">
                        </label>
                        <button onclick="showForm(null)" class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold text-sm shadow-md hover:bg-indigo-700 transition"><i data-lucide="plus-circle" class="w-4 h-4"></i> Tambah</button>
                    </div>
                </div>

                <div id="stat-container" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>

                <div class="grid lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="p-4 bg-gray-50/50 border-b">
                            <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Cari peminjam..." class="w-full px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                        </div>
                        <div id="senarai-peminjam-container"></div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col h-[400px]">
                        <div class="p-3 bg-gray-50 border-b flex justify-between items-center text-xs font-bold text-gray-600 uppercase">Audit Log</div>
                        <div id="log-container" class="overflow-y-auto flex-1"></div>
                    </div>
                </div>
            </div>

            <div id="form-view" class="hidden">
                <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl p-8 border">
                    <div class="flex justify-between items-center mb-6 border-b pb-4">
                        <h2 class="text-xl font-bold">Borang Peminjam</h2>
                        <button onclick="showList()"><i data-lucide="x-circle" class="w-6 h-6 text-gray-300"></i></button>
                    </div>
                    <form id="pinjaman-form" onsubmit="handleSimpan(event)" class="space-y-4">
                        <input type="hidden" id="pinjaman-id" name="id">
                        <div class="grid md:grid-cols-2 gap-4 text-sm">
                            <input type="text" id="namaPeminjam" name="namaPeminjam" placeholder="Nama Peminjam" required class="p-2 border rounded bg-gray-50">
                            <input type="text" id="noKP" name="noKP" placeholder="No. KP" class="p-2 border rounded bg-gray-50">
                            <input type="number" id="jumlahPinjaman" name="jumlahPinjaman" step="0.01" placeholder="Prinsipal (RM)" required class="p-2 border rounded bg-gray-50">
                            <input type="number" step="0.01" id="kadarFaedah" name="kadarFaedah" placeholder="Faedah %" required class="p-2 border rounded bg-gray-50">
                            <input type="number" id="tempohBulan" name="tempohBulan" placeholder="Tempoh (Bulan)" required class="p-2 border rounded bg-gray-50">
                            <input type="date" id="tarikh_mula" name="tarikh_mula" required class="p-2 border rounded bg-gray-50">
                        </div>
                        <div id="auto-kira-info" class="p-3 bg-indigo-50 text-indigo-700 font-bold text-center text-xs rounded-lg"></div>
                        <button type="submit" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold uppercase shadow-lg">Simpan Rekod</button>
                    </form>
                </div>
            </div>

            <div id="detail-view" class="hidden"></div>

        </div>
    </div>

    <script>
        let senaraiPeminjam = [];
        const STORAGE_KEY = 'kesedar_v3_data';
        const LOG_KEY = 'kesedar_logs';

        const storage = {
            save: async (data) => localStorage.setItem(STORAGE_KEY, JSON.stringify(data)),
            load: async () => JSON.parse(localStorage.getItem(STORAGE_KEY)) || []
        };

        const tambahLog = (aktiviti, peminjam) => {
            const logs = JSON.parse(localStorage.getItem(LOG_KEY)) || [];
            logs.unshift({ tarikh: new Date().toLocaleString('ms-MY'), aktiviti, peminjam });
            localStorage.setItem(LOG_KEY, JSON.stringify(logs.slice(0, 50)));
            renderLogs();
        };

        const hitungBayaranBulanan = (p, r_annual, n) => {
            const r = (r_annual / 100) / 12;
            if (r === 0) return p / n;
            return (p * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
        };

        const tentukanStatusPinjaman = (peminjam) => {
            const mula = new Date(peminjam.tarikh_mula);
            const sekarang = new Date();
            const bulanBerlalu = (sekarang.getFullYear() - mula.getFullYear()) * 12 + (sekarang.getMonth() - mula.getMonth());
            const bayaranDibuat = (peminjam.bayaranRekod || []).length;
            if (bayaranDibuat >= peminjam.tempohBulan) return { label: 'Selesai', class: 'bg-green-100 text-green-700' };
            if (bayaranDibuat < bulanBerlalu) return { label: 'Tunggakan', class: 'bg-red-100 text-red-700' };
            return { label: 'Aktif', class: 'bg-blue-100 text-blue-700' };
        };

        const loadSenaraiPeminjam = async () => {
            senaraiPeminjam = await storage.load();
            renderStats(); renderListView(); renderLogs();
        };

        const renderStats = () => {
            const totalD = senaraiPeminjam.reduce((s, p) => s + p.jumlahPinjaman, 0);
            const totalT = senaraiPeminjam.filter(p => tentukanStatusPinjaman(p).label === 'Tunggakan').length;
            document.getElementById('stat-container').innerHTML = `
                <div class="bg-white p-5 rounded-2xl border shadow-sm"><p class="text-[10px] uppercase font-bold text-gray-400">Total Peminjam</p><p class="text-2xl font-black">${senaraiPeminjam.length}</p></div>
                <div class="bg-white p-5 rounded-2xl border shadow-sm"><p class="text-[10px] uppercase font-bold text-gray-400">Prinsipal Pokok</p><p class="text-2xl font-black text-indigo-600">RM ${totalD.toLocaleString()}</p></div>
                <div class="bg-white p-5 rounded-2xl border border-red-100 shadow-sm"><p class="text-[10px] uppercase font-bold text-red-400">Kes Tunggakan</p><p class="text-2xl font-black text-red-600">${totalT}</p></div>
            `;
        };

        const renderListView = (data = senaraiPeminjam) => {
            const container = document.getElementById('senarai-peminjam-container');
            let html = `<table class="w-full text-left text-sm"><tbody class="divide-y">`;
            data.forEach(p => {
                const stat = tentukanStatusPinjaman(p);
                html += `<tr>
                    <td class="px-6 py-4 font-bold text-gray-800">${p.namaPeminjam}<div class="text-[10px] font-normal text-gray-400">${p.noKP || '-'}</div></td>
                    <td class="px-6 py-4"><span class="px-2 py-0.5 rounded-full text-[9px] font-black ${stat.class}">${stat.label}</span></td>
                    <td class="px-6 py-4 text-right font-mono font-bold">RM ${p.jumlahPinjaman.toLocaleString()}</td>
                    <td class="px-6 py-4 text-right flex justify-end gap-2">
                        <button onclick="showDetail('${p.id}')" class="p-2 text-indigo-600 bg-indigo-50 rounded-lg hover:bg-indigo-600 hover:text-white transition"><i data-lucide="eye" class="w-4 h-4"></i></button>
                        <button onclick="showForm('${p.id}')" class="p-2 text-amber-600 bg-amber-50 rounded-lg hover:bg-amber-600 hover:text-white transition"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                        <button onclick="hapusPeminjam('${p.id}')" class="p-2 text-red-600 bg-red-50 rounded-lg hover:bg-red-600 hover:text-white transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>`;
            });
            container.innerHTML = html + `</tbody></table>`;
            lucide.createIcons();
        };

        const renderLogs = () => {
            const logs = JSON.parse(localStorage.getItem(LOG_KEY)) || [];
            document.getElementById('log-container').innerHTML = logs.map(l => `<div class="p-2 border-b text-[10px] hover:bg-gray-50"><span class="text-gray-400">${l.tarikh}</span><br><b>${l.peminjam}</b>: ${l.aktiviti}</div>`).join('');
        };

        const showDetail = (id) => {
            window.peminjamAktifID = id;
            const p = senaraiPeminjam.find(x => x.id === id);
            document.getElementById('list-view').classList.add('hidden');
            const view = document.getElementById('detail-view');
            view.classList.remove('hidden');
            
            const ansuran = hitungBayaranBulanan(p.jumlahPinjaman, p.kadarFaedah, p.tempohBulan);
            const jumlahPelunasan = ansuran * p.tempohBulan;

            let html = `
                <div class="no-print flex justify-between bg-white p-4 border rounded-xl mb-6 shadow-sm">
                    <button onclick="showList()" class="flex items-center gap-2 text-gray-600 font-bold hover:text-indigo-600"><i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali</button>
                    <button onclick="window.print()" class="px-6 py-2 bg-indigo-600 text-white rounded-lg flex items-center gap-2 text-xs font-bold shadow-md"><i data-lucide="printer" class="w-4 h-4"></i> Cetak PDF</button>
                </div>

                <div class="bg-white p-10 border shadow-lg max-w-6xl mx-auto">
                    <div class="print-only text-center mb-10 border-b-2 border-black pb-4">
                        <h1 class="text-2xl font-black uppercase">PENYATA LEJER PINJAMAN KESEDAR</h1>
                        <p class="text-xs font-bold uppercase">Lembaga Kemajuan Kelantan Selatan</p>
                    </div>

                    <div class="grid grid-cols-2 gap-8 mb-8 border-b pb-6">
                        <div>
                            <p class="text-[10px] text-gray-400 uppercase font-bold">Butiran Peminjam</p>
                            <p class="text-xl font-bold">${p.namaPeminjam}</p>
                            <p class="text-sm font-mono text-gray-600">${p.noKP || '-'}</p>
                        </div>
                        <div class="text-right space-y-1">
                            <p class="text-xs">Prinsipal Pokok: <b>RM ${p.jumlahPinjaman.toLocaleString()}</b></p>
                            <p class="text-xs">Jumlah Pelunasan: <b>RM ${jumlahPelunasan.toFixed(2)}</b></p>
                            <p class="text-xl font-black text-indigo-600 mt-2">Ansuran: RM ${ansuran.toFixed(2)}</p>
                        </div>
                    </div>

                    <table class="w-full text-[10px] border">
                        <thead>
                            <tr class="bg-gray-100 uppercase">
                                <th class="p-2 border">Bulan</th>
                                <th class="p-2 border">Tarikh</th>
                                <th class="p-2 border text-right">Baki Prinsipal (RM)</th>
                                <th class="p-2 border text-right bg-indigo-50">Baki Sebenar (RM)</th>
                                <th class="p-2 border text-center no-print">Status</th>
                            </tr>
                        </thead>
                        <tbody>`;

            let bakiPrinsipal = p.jumlahPinjaman;
            let bakiSebenar = jumlahPelunasan;
            const r = (p.kadarFaedah / 100) / 12;

            for (let i = 1; i <= p.tempohBulan; i++) {
                const faedahBulanIni = bakiPrinsipal * r;
                let prinsipalBulanIni = ansuran - faedahBulanIni;
                if (i === p.tempohBulan) { prinsipalBulanIni = bakiPrinsipal; bakiPrinsipal = 0; bakiSebenar = 0; } 
                else { bakiPrinsipal -= prinsipalBulanIni; bakiSebenar -= ansuran; }
                const d = new Date(p.tarikh_mula); d.setMonth(d.getMonth() + i);
                const sudah = p.bayaranRekod.some(b => b.bulan === i);
                
                html += `
                    <tr class="${sudah ? 'row-paid' : ''}">
                        <td class="p-2 border text-center font-bold">${i}</td>
                        <td class="p-2 border font-mono text-[9px]">${d.toISOString().split('T')[0]}</td>
                        <td class="p-2 border text-right font-mono">${Math.max(0, bakiPrinsipal).toFixed(2)}</td>
                        <td class="p-2 border text-right font-mono font-bold text-indigo-700 bg-indigo-50/20">${Math.max(0, bakiSebenar).toFixed(2)}</td>
                        <td class="p-2 border text-center no-print">
                            ${sudah ? '<b class="text-green-600">PAID</b>' : `<button onclick="rekodBayaran(${i})" class="bg-indigo-600 text-white px-2 py-0.5 rounded text-[8px] font-bold">SAHKAN</button>`}
                        </td>
                    </tr>`;
            }

            html += `</tbody></table>
                    <div class="print-only print-footer">
                        <div class="signature-box"><p class="mb-10">Pegawai Pengesah</p><p>( ............................ )</p></div>
                        <div class="signature-box"><p class="mb-10">Peminjam</p><p>( ............................ )</p></div>
                    </div>
                </div>`;
            
            view.innerHTML = html;
            lucide.createIcons();
        };

        const handleSimpan = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd.entries());
            data.id = data.id || Date.now().toString();
            data.jumlahPinjaman = parseFloat(data.jumlahPinjaman);
            data.kadarFaedah = parseFloat(data.kadarFaedah);
            data.tempohBulan = parseInt(data.tempohBulan);
            const idx = senaraiPeminjam.findIndex(p => p.id === data.id);
            if (idx > -1) { data.bayaranRekod = senaraiPeminjam[idx].bayaranRekod; senaraiPeminjam[idx] = data; tambahLog("Edit Rekod", data.namaPeminjam); }
            else { data.bayaranRekod = []; senaraiPeminjam.push(data); tambahLog("Pendaftaran Baru", data.namaPeminjam); }
            await storage.save(senaraiPeminjam);
            showList(); loadSenaraiPeminjam();
        };

        const rekodBayaran = async (bulan) => {
            const p = senaraiPeminjam.find(x => x.id === window.peminjamAktifID);
            if (!p.bayaranRekod.some(b => b.bulan === bulan)) {
                p.bayaranRekod.push({ bulan, tarikh: new Date().toISOString() });
                await storage.save(senaraiPeminjam);
                tambahLog(`Bayaran Bulan ${bulan}`, p.namaPeminjam);
                showDetail(p.id);
            }
        };

        const hapusPeminjam = async (id) => {
            const p = senaraiPeminjam.find(x => x.id === id);
            if(confirm(`PERHATIAN: Adakah anda pasti mahu menghapuskan rekod ${p.namaPeminjam}? Semua data bayaran akan dipadamkan selama-lamanya.`)) {
                senaraiPeminjam = senaraiPeminjam.filter(x => x.id !== id);
                await storage.save(senaraiPeminjam);
                tambahLog("Peminjam Dihapuskan", p.namaPeminjam);
                loadSenaraiPeminjam();
            }
        };

        const showList = () => { document.getElementById('list-view').classList.remove('hidden'); document.getElementById('form-view').classList.add('hidden'); document.getElementById('detail-view').classList.add('hidden'); renderStats(); };
        const showForm = (id) => {
            document.getElementById('list-view').classList.add('hidden'); document.getElementById('form-view').classList.remove('hidden');
            const f = document.getElementById('pinjaman-form'); f.reset(); document.getElementById('pinjaman-id').value = '';
            if (id) {
                const p = senaraiPeminjam.find(x => x.id === id);
                document.getElementById('pinjaman-id').value = p.id; document.getElementById('namaPeminjam').value = p.namaPeminjam;
                document.getElementById('noKP').value = p.noKP; document.getElementById('jumlahPinjaman').value = p.jumlahPinjaman;
                document.getElementById('tempohBulan').value = p.tempohBulan; document.getElementById('kadarFaedah').value = p.kadarFaedah;
                document.getElementById('tarikh_mula').value = p.tarikh_mula;
            }
        };

        window.backupData = () => { const blob = new Blob([JSON.stringify(senaraiPeminjam)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup_kesedar.json`; a.click(); };
        window.restoreData = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    await storage.save(data); senaraiPeminjam = data;
                    tambahLog("Restore Database", "Sistem"); loadSenaraiPeminjam();
                } catch (err) { alert("Format backup tidak sah!"); }
                e.target.value = '';
            };
            reader.readAsText(file);
        };

        window.exportToCSV = () => {
            const rows = [["Nama", "KP", "Prinsipal", "Status"], ...senaraiPeminjam.map(p => [p.namaPeminjam, p.noKP, p.jumlahPinjaman, tentukanStatusPinjaman(p).label])];
            const content = rows.map(e => e.join(",")).join("\n");
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([content], { type: 'text/csv' })); a.download = 'lejer.csv'; a.click();
        };

        window.padamLog = () => { if(confirm('Kosongkan sejarah audit?')) { localStorage.removeItem(LOG_KEY); renderLogs(); } };
        window.handleSearch = () => { const q = document.getElementById('searchInput').value.toLowerCase(); renderListView(senaraiPeminjam.filter(p => p.namaPeminjam.toLowerCase().includes(q) || (p.noKP && p.noKP.includes(q)))); };
        
        document.getElementById('pinjaman-form').addEventListener('input', () => {
            const p = parseFloat(document.getElementById('jumlahPinjaman').value) || 0;
            const r = parseFloat(document.getElementById('kadarFaedah').value) || 0;
            const n = parseInt(document.getElementById('tempohBulan').value) || 0;
            if (p > 0 && n > 0) document.getElementById('auto-kira-info').innerText = `Ansuran: RM ${hitungBayaranBulanan(p, r, n).toFixed(2)}`;
        });

        window.onload = loadSenaraiPeminjam;
    </script>
</body>
</html>
